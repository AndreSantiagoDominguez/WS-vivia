name: Deploy WS-vivia

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Secrets requeridos: EC2_HOST, EC2_USERNAME, EC2_RSYNC_KEY, EC2_DEPLOY_KEY,
    # DATABASE_URL, DATABASE_SSL, JWT_SECRET, CLOUDINARY_CLOUD_NAME,
    # CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET, USERS_DATABASE_URL,
    # FIREBASE_ADMINSDK_JSON (contenido del service account JSON)
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_RSYNC_KEY }}" > ~/.ssh/rsync_key
          echo "${{ secrets.EC2_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/rsync_key ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sincronizar archivos al servidor
        run: |
          rsync -avz --delete --exclude='.git/' --exclude='node_modules/' --exclude='.env' \
            -e "ssh -i ~/.ssh/rsync_key -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10" \
            ./ "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:"

      - name: Desplegar
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          USERS_DATABASE_URL: ${{ secrets.USERS_DATABASE_URL }}
          FIREBASE_ADMINSDK_JSON: ${{ secrets.FIREBASE_ADMINSDK_JSON }}
        run: |
          cat <<EOF | ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" "cat > .env"
          PORT=3001
          DATABASE_URL=$DATABASE_URL
          DATABASE_SSL=$DATABASE_SSL
          JWT_SECRET=$JWT_SECRET
          CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME
          CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
          CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
          USERS_DATABASE_URL=$USERS_DATABASE_URL
          FIREBASE_KEY_PATH=/var/run/secrets/firebase-adminsdk.json
          EOF
          printf '%s' "$FIREBASE_ADMINSDK_JSON" | ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" "mkdir -p secrets && cat > secrets/firebase-adminsdk.json && chmod 600 secrets/firebase-adminsdk.json"